<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Photo de Profil — Aïssa Belkoussa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#e5e5e5;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:40px 20px;font-family:'Inter',sans-serif}
    .instructions{max-width:600px;margin-bottom:24px;text-align:center;font-size:13px;color:#666;line-height:1.7}
    .instructions strong{color:#1a1a1a}
    .controls{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
    .control-group{display:flex;flex-direction:column;align-items:center;gap:4px}
    .control-group label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#999}
    input[type="range"]{width:140px;accent-color:#1a1a1a}
    .preview-row{display:flex;gap:32px;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
    .preview-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#999;text-align:center;margin-bottom:8px}
    .frame-circle{width:min(400px,80vw);height:min(400px,80vw);border-radius:50%;overflow:hidden;position:relative;background:#fdfdfd;box-shadow:0 0 0 4px #fdfdfd,0 0 0 5px #eee,0 20px 60px rgba(0,0,0,.08)}
    .frame-square{width:min(400px,80vw);height:min(400px,80vw);border-radius:12px;overflow:hidden;position:relative;background:#fdfdfd;border:1px solid #eee;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    .frame-circle::before,.frame-square::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.012) 1px,transparent 1px);background-size:32px 32px;z-index:0}
    .frame-circle img,.frame-square img{position:absolute;z-index:1;object-fit:contain}
    .export-btn{padding:14px 36px;background:#1a1a1a;color:#fdfdfd;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
    .export-btn:hover{opacity:.8}
    .note{margin-top:12px;font-size:11px;color:#999}
  </style>
</head>
<body>

  <div class="instructions">
    <strong>Photo de profil LinkedIn</strong> &mdash; Photo du site web, fond #fdfdfd, ratio 1:1<br>
    Ajuste le zoom et la position. Exporte en PNG @2x (1600&times;1600).
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Zoom</label>
      <input type="range" id="zoom" min="30" max="200" value="100" oninput="update()">
    </div>
    <div class="control-group">
      <label>Position X</label>
      <input type="range" id="posX" min="20" max="80" value="50" oninput="update()">
    </div>
    <div class="control-group">
      <label>Position Y</label>
      <input type="range" id="posY" min="10" max="80" value="38" oninput="update()">
    </div>
  </div>

  <div class="preview-row">
    <div>
      <div class="preview-label">Aper&ccedil;u LinkedIn (cercle)</div>
      <div class="frame-circle" id="circleFrame">
        <img id="imgCircle" src="" alt="">
      </div>
    </div>
    <div>
      <div class="preview-label">Export r&eacute;el (carr&eacute;)</div>
      <div class="frame-square" id="squareFrame">
        <img id="imgSquare" src="" alt="">
      </div>
    </div>
  </div>

  <button class="export-btn" id="exportBtn">Exporter en PNG @2x</button>
  <p class="note">Export 1600 &times; 1600 px &mdash; carr&eacute;, fond #fdfdfd</p>

    const photoSrc = photoPath.startsWith('data:') ? photoPath : 'file://' + photoPath;

    function update() {
      const z = document.getElementById('zoom').value;
      const x = document.getElementById('posX').value;
      const y = document.getElementById('posY').value;
      const style = `position:absolute;z-index:1;object-fit:contain;width:${z}%;left:${x}%;top:${y}%;transform:translate(-50%,-50%);`;

      const ic = document.getElementById('imgCircle');
      const is2 = document.getElementById('imgSquare');
      ic.src = photoSrc;
      is2.src = photoSrc;
      ic.style.cssText = style;
      is2.style.cssText = style;
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
      const btn = document.getElementById('exportBtn');
      btn.textContent = 'Export en cours...';
      btn.style.opacity = '0.5';
      btn.style.pointerEvents = 'none';

      const scale = 2;
      const size = 800;
      const canvas = document.createElement('canvas');
      canvas.width = size * scale;
      canvas.height = size * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);

      // Background
      ctx.fillStyle = '#fdfdfd';
      ctx.fillRect(0, 0, size, size);

      // Grid
      ctx.strokeStyle = 'rgba(0,0,0,0.012)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= size; x += 32) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, size); ctx.stroke(); }
      for (let y = 0; y <= size; y += 32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(size, y); ctx.stroke(); }

      const img = new Image();
      img.onload = () => {
        const zoom = document.getElementById('zoom').value / 100;
        const posX = document.getElementById('posX').value / 100;
        const posY = document.getElementById('posY').value / 100;
        const drawW = size * zoom;
        const drawH = (img.naturalHeight / img.naturalWidth) * drawW;
        const drawX = (size * posX) - (drawW / 2);
        const drawY = (size * posY) - (drawH / 2);
        ctx.drawImage(img, drawX, drawY, drawW, drawH);

        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'linkedin-photo-aissabelkoussa-@2x.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          btn.textContent = 'OK !';
          btn.style.background = '#16a34a';
          setTimeout(() => { btn.textContent = 'Exporter en PNG @2x'; btn.style.background = '#1a1a1a'; btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }, 3000);
        }, 'image/png', 1.0);
      };

      img.onerror = () => {
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'linkedin-photo-fond-@2x.png';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          btn.textContent = 'Fond seul (ajoute la photo manuellement)';
          btn.style.background = '#d97706';
          setTimeout(() => { btn.textContent = 'Exporter en PNG @2x'; btn.style.background = '#1a1a1a'; btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }, 4000);
        }, 'image/png', 1.0);
      };

      img.src = photoSrc;
    });

    update();
  </script>
