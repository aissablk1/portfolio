<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Photo de Profil — Aïssa Belkoussa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100vh}
    html{background:#e5e5e5}
    body{background:#e5e5e5;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px 60px;font-family:'Inter',sans-serif}
    .instructions{max-width:600px;margin-bottom:32px;text-align:center;font-size:13px;color:#666;line-height:1.7}
    .instructions strong{color:#1a1a1a}
    .preview-row{display:flex;gap:48px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
    .preview-col{display:flex;flex-direction:column;align-items:center;gap:16px;max-width:440px}
    .preview-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#999;text-align:center}
    .controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .control-group{display:flex;flex-direction:column;align-items:center;gap:4px}
    .control-group label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#999}
    .slider-row{display:flex;align-items:center;gap:6px}
    input[type="range"]{width:100px;accent-color:#1a1a1a}
    input[type="number"]{width:48px;padding:3px 4px;border:1px solid #ccc;border-radius:4px;font-family:'Inter',sans-serif;font-size:11px;text-align:center;color:#1a1a1a;background:#fff;-moz-appearance:textfield}
    input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    input[type="number"]:focus{outline:none;border-color:#1a1a1a}
    .frame-circle{width:min(380px,75vw);height:min(380px,75vw);border-radius:50%;overflow:hidden;position:relative;background:#fdfdfd;box-shadow:0 0 0 4px #fdfdfd,0 0 0 5px #eee,0 20px 60px rgba(0,0,0,.08)}
    .frame-square{width:min(380px,75vw);height:min(380px,75vw);border-radius:12px;overflow:hidden;position:relative;background:#fdfdfd;border:1px solid #eee;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    .frame-circle::before,.frame-square::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.012) 1px,transparent 1px);background-size:32px 32px;z-index:0}
    .frame-circle img{position:absolute;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;clip-path:circle(50% at 50% 50%)}
    .frame-square img{position:absolute;z-index:1;object-fit:contain}
    .export-btn{padding:14px 36px;background:#1a1a1a;color:#fdfdfd;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:opacity .2s}
    .export-btn:hover{opacity:.8}
    .note{font-size:11px;color:#999;text-align:center}
  </style>
</head>
<body>

  <div class="instructions">
    <strong>Photo de profil LinkedIn</strong> &mdash; Photo du site web, fond #fdfdfd, ratio 1:1<br>
    Ajuste le zoom et la position. Exporte en PNG @2x (1600&times;1600).
  </div>

  <div class="preview-row">
    <div class="preview-col">
      <div class="preview-label">Aper&ccedil;u LinkedIn (cercle)</div>
      <div class="controls">
        <div class="control-group"><label>Zoom</label><div class="slider-row"><input type="range" id="zoomCircle" min="30" max="200" value="100" oninput="syncNum(this);updateCircle()"><input type="number" id="zoomCircleNum" min="30" max="200" value="100" oninput="syncRange(this,'zoomCircle');updateCircle()"></div></div>
        <div class="control-group"><label>Position X</label><div class="slider-row"><input type="range" id="posXCircle" min="0" max="100" value="50" oninput="syncNum(this);updateCircle()"><input type="number" id="posXCircleNum" min="0" max="100" value="50" oninput="syncRange(this,'posXCircle');updateCircle()"></div></div>
        <div class="control-group"><label>Position Y</label><div class="slider-row"><input type="range" id="posYCircle" min="0" max="100" value="50" oninput="syncNum(this);updateCircle()"><input type="number" id="posYCircleNum" min="0" max="100" value="50" oninput="syncRange(this,'posYCircle');updateCircle()"></div></div>
      </div>
      <div class="frame-circle" id="circleFrame">
        <img id="imgCircle" src="" alt="">
      </div>
      <button class="export-btn" id="exportCircleBtn">Exporter cercle PNG @2x</button>
      <p class="note">Export 1600 &times; 1600 px &mdash; cercle, fond #fdfdfd</p>
    </div>
    <div class="preview-col">
      <div class="preview-label">Export r&eacute;el (carr&eacute;)</div>
      <div class="controls">
        <div class="control-group"><label>Zoom</label><div class="slider-row"><input type="range" id="zoomSquare" min="30" max="120" value="65" oninput="syncNum(this);updateSquare()"><input type="number" id="zoomSquareNum" min="30" max="120" value="65" oninput="syncRange(this,'zoomSquare');updateSquare()"></div></div>
        <div class="control-group"><label>Position X</label><div class="slider-row"><input type="range" id="posXSquare" min="20" max="80" value="50" oninput="syncNum(this);updateSquare()"><input type="number" id="posXSquareNum" min="20" max="80" value="50" oninput="syncRange(this,'posXSquare');updateSquare()"></div></div>
        <div class="control-group"><label>Position Y</label><div class="slider-row"><input type="range" id="posYSquare" min="10" max="80" value="38" oninput="syncNum(this);updateSquare()"><input type="number" id="posYSquareNum" min="10" max="80" value="38" oninput="syncRange(this,'posYSquare');updateSquare()"></div></div>
      </div>
      <div class="frame-square" id="squareFrame">
        <img id="imgSquare" src="" alt="">
      </div>
      <button class="export-btn" id="exportSquareBtn">Exporter carr&eacute; PNG @2x</button>
      <p class="note">Export 1600 &times; 1600 px &mdash; carr&eacute;, fond #fdfdfd</p>
    </div>
  </div>

    const photoSrc = photoPath.startsWith('data:') ? photoPath : 'file://' + photoPath;

    function syncNum(rangeEl) {
      var numEl = document.getElementById(rangeEl.id + 'Num');
      if (numEl) numEl.value = rangeEl.value;
    }

    function syncRange(numEl, rangeId) {
      var rangeEl = document.getElementById(rangeId);
      if (rangeEl) {
        var v = Number(numEl.value);
        var lo = Number(rangeEl.min), hi = Number(rangeEl.max);
        if (v < lo) v = lo;
        if (v > hi) v = hi;
        rangeEl.value = v;
        numEl.value = v;
      }
    }

    function updateCircle() {
      const z = document.getElementById('zoomCircle').value;
      const x = document.getElementById('posXCircle').value;
      const y = document.getElementById('posYCircle').value;
      const ic = document.getElementById('imgCircle');
      ic.src = photoSrc;
      ic.style.cssText = 'position:absolute;inset:0;z-index:1;width:100%;height:100%;object-fit:cover;clip-path:circle(50% at 50% 50%);object-position:'+x+'% '+y+'%;transform:scale('+(z/100)+');';
    }

    function updateSquare() {
      const z = document.getElementById('zoomSquare').value;
      const x = document.getElementById('posXSquare').value;
      const y = document.getElementById('posYSquare').value;
      const is2 = document.getElementById('imgSquare');
      is2.src = photoSrc;
      is2.style.cssText = 'position:absolute;z-index:1;object-fit:contain;width:'+z+'%;left:'+x+'%;top:'+y+'%;transform:translate(-50%,-50%);';
    }

    function exportCanvas(zoomId, posXId, posYId, filename, btn, clipCircle) {
      btn.textContent = 'Export en cours...';
      btn.style.opacity = '0.5';
      btn.style.pointerEvents = 'none';
      var size = 800, scale = 2;
      var canvas = document.createElement('canvas');
      canvas.width = size * scale;
      canvas.height = size * scale;
      var ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#fdfdfd';
      ctx.fillRect(0, 0, size, size);

      var img = new Image();
      img.onload = function() {
        var zoom = document.getElementById(zoomId).value / 100;
        var posX = document.getElementById(posXId).value / 100;
        var posY = document.getElementById(posYId).value / 100;

        if (clipCircle) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
          ctx.clip();
          var drawSize = size * zoom;
          var ratio = img.naturalHeight / img.naturalWidth;
          var drawW, drawH;
          if (ratio > 1) { drawW = drawSize; drawH = drawSize * ratio; }
          else { drawH = drawSize; drawW = drawSize / ratio; }
          var drawX = (size * posX) - (drawW / 2);
          var drawY = (size * posY) - (drawH / 2);
          ctx.drawImage(img, drawX, drawY, drawW, drawH);
          ctx.restore();
        } else {
          var drawW = size * zoom;
          var drawH = (img.naturalHeight / img.naturalWidth) * drawW;
          var drawX = (size * posX) - (drawW / 2);
          var drawY = (size * posY) - (drawH / 2);
          ctx.drawImage(img, drawX, drawY, drawW, drawH);
        }

        canvas.toBlob(function(blob) {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          btn.textContent = 'OK !';
          btn.style.background = '#16a34a';
          setTimeout(function() { btn.textContent = btn.dataset.label; btn.style.background = '#1a1a1a'; btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }, 3000);
        }, 'image/png', 1.0);
      };

      img.onerror = function() {
        btn.textContent = 'Erreur image';
        btn.style.background = '#d97706';
        setTimeout(function() { btn.textContent = btn.dataset.label; btn.style.background = '#1a1a1a'; btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }, 3000);
      };

      img.src = photoSrc;
    }

    var btnCircle = document.getElementById('exportCircleBtn');
    var btnSquare = document.getElementById('exportSquareBtn');
    btnCircle.dataset.label = btnCircle.textContent;
    btnSquare.dataset.label = btnSquare.textContent;

    btnCircle.addEventListener('click', function() {
      exportCanvas('zoomCircle', 'posXCircle', 'posYCircle', 'linkedin-photo-cercle-@2x.png', btnCircle, true);
    });

    btnSquare.addEventListener('click', function() {
      exportCanvas('zoomSquare', 'posXSquare', 'posYSquare', 'linkedin-photo-carre-@2x.png', btnSquare, false);
    });

    updateCircle();
    updateSquare();
  </script>
